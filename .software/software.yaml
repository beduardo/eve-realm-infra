title: Eve Realm Infra
description: Cluster-level infrastructure for Eve Realm. Kubernetes manifests, NATS and Redis deployments, k3d cluster scripts, shared ConfigMaps, and deployment orchestration.
language: YAML
created: "2026-06-18"
author: beduardo
activeChange: CR-001
autoCommit: true
llmSummary: true
scan:
    includePaths:
        - .
    excludePaths:
        - vendor/
        - node_modules/
        - .git/
    heuristics:
        detectTests: true
        detectTodos: true
        detectInterfaces: true
        detectErrorPatterns: true
vectorDB:
    path: .software/vectors.db
    chunkSize: 500
    chunkOverlap: 50
    embeddingModel: text-embedding-3-small
    synthesisModel: gpt-5-mini
counters:
    ADR: 0
    BF: 0
    CR: 1
    REQ: 0
    SC: 0
    TC: 0
    US: 0
